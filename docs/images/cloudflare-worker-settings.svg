  <rect x="860" y="554" width="190" height="48" rx="12" fill="#f48120"/><text x="955" y="585" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Deploy</text><text x="150" y="580" font-size="14" fill="#687076">添加或修改变量后，需要重新部署。</text></g>
