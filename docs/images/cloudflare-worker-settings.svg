<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Cloudflare Worker variables and secrets</title><desc id="desc">Illustration showing four text variables and one encrypted GitHub token secret.</desc>
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff8f2"/><stop offset="1" stop-color="#f6f7fb"/></linearGradient><filter id="s"><feDropShadow dy="12" stdDeviation="18" flood-opacity=".14"/></filter></defs><rect width="1200" height="680" rx="32" fill="url(#g)"/><rect x="105" y="50" width="990" height="580" rx="24" fill="#fff" filter="url(#s)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"><path d="M154 92c-12-21 10-38 28-27 10-10 29-3 27 12 17 5 14 28-3 30h-48c-13-1-17-10-4-15z" fill="#f48120"/><text x="230" y="96" font-size="25" font-weight="700" fill="#202124">Variables and Secrets</text><text x="155" y="138" font-size="14" fill="#687076">Settings → Variables and Secrets → Add</text>
  <rect x="150" y="166" width="900" height="62" rx="10" fill="#f7f7f8"/><text x="175" y="203" font-size="15" font-weight="650" fill="#202124">GITHUB_OWNER</text><text x="530" y="203" font-size="15" fill="#687076">your-name</text><rect x="925" y="179" width="96" height="34" rx="17" fill="#eef0f2"/><text x="973" y="201" text-anchor="middle" font-size="13" fill="#4b5563">Text</text>
  <rect x="150" y="238" width="900" height="62" rx="10" fill="#f7f7f8"/><text x="175" y="275" font-size="15" font-weight="650" fill="#202124">GITHUB_REPOSITORY</text><text x="530" y="275" font-size="15" fill="#687076">Surge-Relay</text><rect x="925" y="251" width="96" height="34" rx="17" fill="#eef0f2"/><text x="973" y="273" text-anchor="middle" font-size="13" fill="#4b5563">Text</text>
  <rect x="150" y="310" width="900" height="62" rx="10" fill="#f7f7f8"/><text x="175" y="347" font-size="15" font-weight="650" fill="#202124">GITHUB_BRANCH</text><text x="530" y="347" font-size="15" fill="#687076">main</text><rect x="925" y="323" width="96" height="34" rx="17" fill="#eef0f2"/><text x="973" y="345" text-anchor="middle" font-size="13" fill="#4b5563">Text</text>
  <rect x="150" y="382" width="900" height="62" rx="10" fill="#f7f7f8"/><text x="175" y="419" font-size="15" font-weight="650" fill="#202124">GITHUB_DIRECTORY</text><text x="530" y="419" font-size="15" fill="#687076">modules</text><rect x="925" y="395" width="96" height="34" rx="17" fill="#eef0f2"/><text x="973" y="417" text-anchor="middle" font-size="13" fill="#4b5563">Text</text>
