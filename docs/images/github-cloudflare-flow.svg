<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Surge Relay GitHub Cloudflare workflow</title>
  <desc id="desc">Surge Relay publishes modules to a private GitHub repository. Cloudflare Worker reads the repository and provides stable subscriptions to Surge devices.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7f9ff"/><stop offset="1" stop-color="#eef8ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#16345f" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#6b7c93"/></marker>
  </defs>
  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
  <text x="60" y="62" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="27" font-weight="700" fill="#182033">一次配置，后续自动同步</text>
  <text x="60" y="94" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#667085">可写 Token 只留在 Mac；设备只接触 Cloudflare 公共地址</text>
  <g filter="url(#shadow)">
    <rect x="58" y="136" width="250" height="210" rx="26" fill="#fff"/>
    <rect x="350" y="136" width="250" height="210" rx="26" fill="#fff"/>
    <rect x="642" y="136" width="250" height="210" rx="26" fill="#fff"/>
    <rect x="934" y="136" width="208" height="210" rx="26" fill="#fff"/>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <circle cx="183" cy="205" r="42" fill="#e9efff"/><path d="M157 211h17v30h-17zm26-42h17v72h-17zm26 20h17v52h-17z" rx="8" fill="#3767f6"/>
    <text x="183" y="280" text-anchor="middle" font-size="21" font-weight="700" fill="#182033">Surge Relay</text><text x="183" y="310" text-anchor="middle" font-size="15" fill="#667085">转换并发布模块</text>
    <circle cx="475" cy="205" r="42" fill="#f0f1f4"/><path d="M475 169a36 36 0 00-11 70c2 0 3-1 3-3v-7c-13 3-16-6-16-6-2-6-6-8-6-8-5-3 0-3 0-3 5 0 8 5 8 5 5 8 13 6 16 4 1-4 2-6 4-7-11-1-22-5-22-24 0-5 2-10 5-13-1-3-3-8 1-13 0 0 4-1 14 5a49 49 0 0126 0c10-6 14-5 14-5 4 5 2 10 1 13 3 3 5 8 5 13 0 19-11 23-22 24 3 2 5 6 5 11v16c0 2 1 3 3 3a36 36 0 00-11-70z" fill="#1f2328"/>
    <text x="475" y="280" text-anchor="middle" font-size="21" font-weight="700" fill="#182033">GitHub 私有仓库</text><text x="475" y="310" text-anchor="middle" font-size="15" fill="#667085">安全保存生成结果</text>
    <circle cx="767" cy="205" r="42" fill="#fff1e7"/><path d="M745 213c-12-21 10-38 28-27 10-10 29-3 27 12 17 5 14 28-3 30h-48c-13-1-17-10-4-15z" fill="#f48120"/>
    <text x="767" y="280" text-anchor="middle" font-size="21" font-weight="700" fill="#182033">Cloudflare Worker</text><text x="767" y="310" text-anchor="middle" font-size="15" fill="#667085">隐藏 Token 并稳定分发</text>
    <circle cx="1038" cy="205" r="42" fill="#e8f7ee"/><rect x="1015" y="181" width="46" height="52" rx="9" fill="none" stroke="#24a148" stroke-width="5"/><circle cx="1038" cy="222" r="3" fill="#24a148"/>
    <text x="1038" y="280" text-anchor="middle" font-size="21" font-weight="700" fill="#182033">Surge 设备</text><text x="1038" y="310" text-anchor="middle" font-size="15" fill="#667085">使用固定订阅地址</text>
  </g>
  <path d="M308 240h38" stroke="#6b7c93" stroke-width="3" marker-end="url(#arrow)"/><path d="M600 240h38" stroke="#6b7c93" stroke-width="3" marker-end="url(#arrow)"/><path d="M892 240h38" stroke="#6b7c93" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="329" y="220" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#667085">写入</text><text x="621" y="220" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#667085">读取</text><text x="913" y="220" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" fill="#667085">订阅</text>
</svg>
