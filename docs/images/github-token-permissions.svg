<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Fine-grained token permissions</title><desc id="desc">Illustration showing one selected repository and Contents read and write permission.</desc>
  <defs><filter id="s"><feDropShadow dy="12" stdDeviation="18" flood-opacity=".14"/></filter></defs><rect width="1200" height="650" rx="32" fill="#f4f6fa"/><rect x="120" y="52" width="960" height="546" rx="24" fill="#fff" filter="url(#s)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"><text x="170" y="112" font-size="27" font-weight="700" fill="#1f2328">New fine-grained personal access token</text>
  <text x="170" y="163" font-size="14" fill="#57606a">Token name</text><rect x="170" y="178" width="600" height="48" rx="8" fill="#fff" stroke="#d0d7de"/><text x="190" y="209" font-size="17" fill="#1f2328">Surge Relay</text>
  <text x="170" y="267" font-size="18" font-weight="650" fill="#1f2328">Repository access</text><rect x="170" y="288" width="20" height="20" rx="10" fill="#0969da"/><circle cx="180" cy="298" r="4" fill="#fff"/><text x="208" y="304" font-size="17" fill="#1f2328">Only select repositories</text>
  <rect x="208" y="325" width="562" height="46" rx="8" fill="#f6f8fa" stroke="#d0d7de"/><text x="228" y="354" font-size="16" fill="#1f2328">✓ Surge-Relay</text>
  <text x="170" y="421" font-size="18" font-weight="650" fill="#1f2328">Repository permissions</text><rect x="170" y="441" width="600" height="70" rx="10" fill="#f6f8fa"/><text x="194" y="482" font-size="17" font-weight="600" fill="#1f2328">Contents</text><rect x="548" y="454" width="198" height="44" rx="8" fill="#fff" stroke="#0969da" stroke-width="2"/><text x="647" y="482" text-anchor="middle" font-size="16" fill="#0969da">Read and write⌄</text>
  <rect x="835" y="178" width="180" height="44" rx="22" fill="#ddf4ff"/><text x="925" y="206" text-anchor="middle" font-size="15" font-weight="700" fill="#0969da">只选择一个仓库</text><path d="M835 205L770 342" stroke="#54aeff" stroke-width="2"/>
  <rect x="835" y="436" width="180" height="44" rx="22" fill="#dafbe1"/><text x="925" y="464" text-anchor="middle" font-size="15" font-weight="700" fill="#1a7f37">App 需要读写权限</text><path d="M835 458l-89 18" stroke="#4ac26b" stroke-width="2"/>
  <text x="170" y="557" font-size="14" fill="#bf8700">Worker Token 请在 Contents 中改选 Read-only，其余设置相同。</text></g>
</svg>
